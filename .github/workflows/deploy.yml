name: Deploy to GitHub Pages

on:
  push:
    branches: [ "master" ]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build WASM/JS and Dokka
        run: ./gradlew -Pbds100MavenUsername=${{ secrets.BDS100MAVENUSERNAME }} -Pbds100MavenPassword=${{ secrets.BDS100MAVENPASSWORD }} :composeApp:wasmJsBrowserDistribution :DLJetpackComposeUtil:dokkaGenerateHtml

      - name: Prepare Pages Output
        run: |
          mkdir -p pages_output
          cp -r composeApp/build/dist/wasmJs/productionExecutable/* pages_output/
          cp -r library/build/dokka/html pages_output/api

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: pages_output

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4